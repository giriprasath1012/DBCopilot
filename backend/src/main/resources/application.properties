# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/dbcopilot_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate  (dialect is auto-detected from the JDBC URL — no need to set it)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT  (must be at least 64 chars for HS512)
app.jwt.secret=DBCopilotSuperSecretJwtKey2024MustBeAtLeast64CharsForHS512SecurityCompliance!!
app.jwt.expiration=86400000

# AI Service URL
ai.service.url=http://localhost:8000

# Logging
logging.level.com.dbcopilot=DEBUG
logging.level.org.springframework.security=INFO
