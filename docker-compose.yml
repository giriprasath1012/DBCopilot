services:
  postgres:
    image: postgres:16-alpine
    container_name: dbcopilot-postgres
    environment:
      POSTGRES_DB: dbcopilot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: dbcopilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: dbcopilot-ai-service
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      # ── Database connection ─────────────────────────────────────────────────
      # DB_TYPE options: postgresql | mysql | oracle | sqlserver | h2
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_NAME=dbcopilot_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      # To use a full JDBC-style URL instead, set DB_URL and it overrides all above:
      # - DB_URL=postgresql+psycopg2://user:pass@host:5432/dbname
      # Tables to hide from the AI (app-internal tables):
      - DB_EXCLUDE_TABLES=users,query_history
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dbcopilot-backend
    ports:
      - "8080:8080"
    environment:
      # ── Database connection ─────────────────────────────────────────────────
      # PostgreSQL (default):
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/dbcopilot_db
      # MySQL:    jdbc:mysql://host:3306/dbname?useSSL=false&allowPublicKeyRetrieval=true
      # Oracle:   jdbc:oracle:thin:@host:1521/service_name
      # SQL Srv:  jdbc:sqlserver://host:1433;databaseName=dbname;encrypt=true;trustServerCertificate=true
      # H2:       jdbc:h2:tcp://host:9092/dbname
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - AI_SERVICE_URL=http://ai-service:8000
      - APP_JWT_SECRET=DBCopilotSuperSecretJwtKey2024MustBeAtLeast64CharsForHS512SecurityCompliance!!
      - APP_JWT_EXPIRATION=86400000
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dbcopilot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
